name: Test

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: swift test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test --skip-build

      # Smoke-builds the live probe scripts so SDK changes that break
      # their compile surface show up on every push, not only when
      # someone runs the probes manually.
      - name: Build probe-agent
        run: cd scripts/probe-agent && swift build

      - name: Build probe-host
        run: cd scripts/probe-host && swift build
